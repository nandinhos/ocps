decisions:
  - id: dec-001
    title: 'Dependência circular gate.ts ↔ agent.ts resolvida com import type'
    description: >
      Gate.check() recebe AgentContext (definido em agent.ts), e AgentResult usa GateStatus
      (definido em gate.ts). A circularidade foi resolvida usando 'import type' em ambos os
      sentidos. Como type imports são apagados pelo compilador TypeScript, não há dependência
      circular no JavaScript gerado — os arquivos compilados são essencialmente vazios (export {}).
    madeAt: '2026-03-05T15:00:00Z'

  - id: dec-002
    title: 'McpConnection e McpConnections definidos em config.ts'
    description: >
      Os tipos McpConnection e McpConnections são necessários para AgentContext mas não foram
      especificados explicitamente na SPEC.md seção 5. Foram adicionados em config.ts por
      coesão com McpConfig (mesmo domínio: configuração e conexões MCP). Evita criar um
      sexto arquivo fora do escopo da t002.
    madeAt: '2026-03-05T15:00:00Z'

  - id: dec-003
    title: 'ArchitectureDecision, Blocker e LlmCheckpoint adicionados em roadmap.ts'
    description: >
      A interface Roadmap referencia esses três tipos mas a SPEC.md não os define
      explicitamente. Foram definidos em roadmap.ts por coesão semântica (pertencem ao
      domínio de roadmap) e com shape derivado do schema real em .ocps/roadmap/fase-0.yaml.
    madeAt: '2026-03-05T15:00:00Z'

  - id: dec-004
    title: 'js-yaml v4: load() não parse() — lição retroalimentada na skill tdd-typescript v1.1'
    description: >
      Durante t003, o import '{ parse as parseYaml }' de js-yaml retornou undefined silenciosamente
      porque js-yaml v4 exporta 'load()', não 'parse()'. O TypeScript não detectou o erro porque
      o tipo de js-yaml aceita o destructuring. A lição foi retroalimentada em
      skills/global/tdd-typescript.yaml v1.1.0 como primeiro exemplo do mecanismo de retroalimentação
      de skills do OCPS.
    madeAt: '2026-03-05T15:10:00Z'

  - id: dec-005
    title: 'CLI Commands implementados: version, init, doctor, start'
    description: >
      t006-t009 implementados com Commander.js. Estrutura: src/cli/index.ts (entry point),
      src/cli/commands/ (version.ts, init.ts, doctor.ts, start.ts), src/cli/ui/ (componentes Ink).
      Testes em tests/cli/init.test.ts. Detecção de stack: package.json > composer.json > requirements.txt.
      CLI funciona corretamente via npm run build + node dist/index.js.
    madeAt: '2026-03-05T15:42:00Z'
  blockers:
