  title: 'Fase 5 — Legacy Mode'
  description: >
    Implementação do LegacyAgent para análise arqueológica de sistemas legados.
    Gera DRF (Document of Reverse-Engineered Features) aprovável.
  acceptanceCriteria:
    - 'LegacyAgent analiza código legado e gera behavior map'
    - 'Identifica divergências entre comportamento e documentação'
