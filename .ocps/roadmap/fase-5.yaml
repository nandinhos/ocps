        completionCriteria: 'Contrato compila, compatível com pipeline'
        assignedAgent: tdd
        status: done
        completedAt: '2026-03-05T18:16:00Z'

      - id: t053
        title: 'LegacyAgent: análise de comportamento'
        description: 'Analisa código legado e gera behavior map'
        completionCriteria: 'Mapeia todas as funções e seus comportamentos'
        assignedAgent: tdd
        status: done
        completedAt: '2026-03-05T18:17:00Z'

      - id: t054
        title: 'LegacyAgent: detecção de divergências'
        description: 'Identifica gaps entre comportamento real e documentação'
        completionCriteria: 'Lista todas as divergências encontradas'
        assignedAgent: tdd
        status: done
        completedAt: '2026-03-05T18:18:00Z'

      - id: t055
        title: 'LegacyAgent: geração de DRF'
