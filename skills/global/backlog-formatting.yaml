name: backlog-formatting
version: 1.0.0
agent: brainstorm
stack:
  - typescript

description: >
  Formatação padronizada de BacklogItems seguindo o contrato do sistema OCPS.
  Garante que todos os campos obrigatórios estejam preenchidos corretamente.

patterns:
  - |
    Formato obrigatório do BacklogItem:
    id: "backlog-{timestamp}"
    title: string (max 80 chars)
    description: string detalhada
    acceptanceCriteria: string[] (min 1)
    status: "pending"
    priority: "low" | "medium" | "high"
  - |
    Prioridade baseada em impacto e urgência:
    high = bloqueador ou requerimento crítico de negócio
    medium = funcionalidade importante mas não bloqueadora
    low = nice-to-have ou melhoria incremental

antiPatterns:
  - |
    NUNCA criar BacklogItem com acceptanceCriteria vazio
  - |
    NUNCA usar prioridade "high" para todas as features

lessonsLearned: []
references: []
updatedAt: "2026-03-06T00:00:00Z"
